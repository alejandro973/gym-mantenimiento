spring:
  application:
    name: mantenimiento
  profiles:
    active: test

server: 
  port: 8089

# Habilitación técnica de OpenAPI y Swagger UI para Mantenimiento
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/